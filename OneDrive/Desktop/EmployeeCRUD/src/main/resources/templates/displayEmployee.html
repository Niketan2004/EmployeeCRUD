<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" th:href= "@{/css/style.css}">
     <title>Employees</title>
</head>

<body>

     <h1 align = center>Employees</h1>
     <hr>
<div>
     <br>
    <form th:action="@{/emp/displayById}" method="GET">
     <input type="text" name="id" placeholder="Search By ID" required> <input type="submit" value="Search">
    </form>
    <br>
    <hr>
</div>

<div>
<table border="1">
     <thead>
          <tr>
               <th>ID</th>
               <th>First Name</th>
               <th>Last Name</th>
               <th>Email</th>
               <th>Mobile Number</th>
          </tr>
     </thead>
     <tbody>
          <tr th:each="emp : ${employees}">
               <td th:text="${emp.id}"></td>
               <td th:text="${emp.firstName}"></td>
               <td th:text="${emp.lastName}"></td>
               <td th:text="${emp.email}"></td>
               <td th:text="${emp.mobileNumber}"></td>
          </tr>
     </tbody>
</table>
</div>
   

</body>

</html>
